{% if assets %}<div class="quality-table-wrap"><table><thead><tr><th>Asset</th><th>Status</th><th>Region</th><th>Editorial review</th></tr></thead><tbody>{% for asset in assets %}<tr><th><a href="{% url 'admin:assets_asset_change' asset.pk %}">{{ asset.name }}</a></th><td>{{ asset.get_status_display }}</td><td>{{ asset.region.name|default:"Not assigned" }}</td><td>{{ asset.reviewed_at|date:"M j, Y"|default:"Pending" }}</td></tr>{% endfor %}</tbody></table></div>{% else %}<p>{{ empty_message }}</p>{% endif %}
