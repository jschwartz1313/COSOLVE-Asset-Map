{% if assets %}<table><thead><tr><th>Asset</th><th>Status</th><th>Region</th><th>Last verified</th></tr></thead><tbody>{% for asset in assets %}<tr><th><a href="{% url 'admin:assets_asset_change' asset.pk %}">{{ asset.name }}</a></th><td>{{ asset.get_status_display }}</td><td>{{ asset.region.name|default:"Not assigned" }}</td><td>{{ asset.last_verified_at|date:"M j, Y"|default:"Never" }}</td></tr>{% endfor %}</tbody></table>{% else %}<p>{{ empty_message }}</p>{% endif %}
