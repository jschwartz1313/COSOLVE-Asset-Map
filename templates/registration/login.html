{% extends "base.html" %}
{% block title %}Sign in | COSOLVE{% endblock %}
{% block content %}
<main id="main-content" class="login-page">
  <form method="post" class="login-form">
    {% csrf_token %}
    <span class="eyebrow">Restricted access</span>
    <h1>Sign in</h1>
    {% if form.errors %}<p class="form-error">The username or password was not recognized.</p>{% endif %}
    <label><span>Username</span>{{ form.username }}</label>
    <label><span>Password</span>{{ form.password }}</label>
    {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
    <button class="button primary full" type="submit">Sign in</button>
  </form>
</main>
{% endblock %}
