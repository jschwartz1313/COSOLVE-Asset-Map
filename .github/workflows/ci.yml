name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ci-only-secret-key
      DJANGO_DEBUG: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: python -m pip install -e '.[dev]'

      - name: Install browser test dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Check Django configuration
        run: python manage.py check

      - name: Check migrations
        run: python manage.py makemigrations --check

      - name: Run backend tests
        run: python manage.py test tests.backend

      - name: Run frontend tests
        run: node --test tests/frontend/*.test.mjs

      - name: Prepare browser test database
        run: |
          python manage.py migrate
          python manage.py seed_real_data --replace-demo --prune

      - name: Run browser tests
        run: npx playwright test

      - name: Lint Python
        run: ruff check apps config scripts tests manage.py

      - name: Collect static files
        run: python manage.py collectstatic --noinput
