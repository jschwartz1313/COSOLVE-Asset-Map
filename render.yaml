databases:
  - name: cosolve-asset-map-db
    plan: free
    databaseName: cosolve_asset_map
    user: cosolve_asset_map

services:
  - type: web
    name: cosolve-asset-map
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: cosolve-asset-map-db
          property: connectionString
      - key: REQUIRE_SITE_LOGIN
        value: "false"
      - key: PYTHON_VERSION
        value: 3.12.7
